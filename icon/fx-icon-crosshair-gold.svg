<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F1F1F"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  
  <!-- Outer ring -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="#D2A03C" stroke-width="60"/>
  
  <!-- Crosshair lines -->
  <line x1="512" y1="120" x2="512" y2="350" stroke="#D2A03C" stroke-width="60" stroke-linecap="round"/>
  <line x1="512" y1="674" x2="512" y2="904" stroke="#D2A03C" stroke-width="60" stroke-linecap="round"/>
  <line x1="120" y1="512" x2="350" y2="512" stroke="#D2A03C" stroke-width="60" stroke-linecap="round"/>
  <line x1="674" y1="512" x2="904" y2="512" stroke="#D2A03C" stroke-width="60" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="512" cy="512" r="70" fill="#D2A03C"/>
</svg>
